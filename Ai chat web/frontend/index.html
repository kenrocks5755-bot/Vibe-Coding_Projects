<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Chat — A clean, minimal chat interface powered by OpenAI." />
  <title>AI Chat</title>

  <!-- Google Fonts: Plus Jakarta Sans for editorial neo-brutalist feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__logo">
      <span class="header__logo-dot"></span>
      AI Chat
    </div>
    <div class="header__meta">
      <!-- Status indicator -->
      <div class="status-badge" id="statusBadge">
        <span class="status-badge__dot"></span>
        Online
      </div>
      <!-- Reset conversation button -->
      <button class="btn btn--ghost" id="resetBtn" title="Clear conversation">
        ↺ Reset
      </button>
    </div>
  </header>

  <!-- ===== MAIN CHAT AREA ===== -->
  <main class="chat-wrapper">

    <!-- Message feed -->
    <div class="chat-feed" id="chatFeed" role="log" aria-live="polite" aria-label="Chat messages">

      <!-- Welcome card shown before any messages -->
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-card__tag">READY</div>
        <h1 class="welcome-card__title">How can I<br/>help you today?</h1>
        <p class="welcome-card__sub">Ask me anything. I'm powered by GPT-4o mini.</p>
      </div>

    </div>

    <!-- Loading indicator (hidden by default) -->
    <div class="loading-bar" id="loadingBar" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

  </main>

  <!-- ===== INPUT DOCK ===== -->
  <footer class="input-dock">
    <div class="input-dock__inner">
      <textarea
        id="messageInput"
        class="input-dock__textarea"
        placeholder="Type a message…"
        rows="1"
        maxlength="4000"
        aria-label="Message input"
      ></textarea>
      <button id="sendBtn" class="btn btn--primary" aria-label="Send message">
        Send ↗
      </button>
    </div>
    <p class="input-dock__hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
